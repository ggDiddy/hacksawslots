      function TweakSelect({ label, value, options, onChange }) {
        return (
          <TweakRow label={label}>
            <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
              {options.map((o) => {
                const v = typeof o === 'object' ? o.value : o;
                const l = typeof o === 'object' ? o.label : o;
                return <option key={v} value={v}>{l}</option>;
              })}
            </select>
          </TweakRow>
        );
      }
      
      function TweakText({ label, value, placeholder, onChange }) {
        return (
          <TweakRow label={label}>
            <input className="twk-field" type="text" value={value} placeholder={placeholder}
                   onChange={(e) => onChange(e.target.value)} />
          </TweakRow>
        );

      function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
        const clamp = (n) => {
          if (min != null && n < min) return min;
          if (max != null && n > max) return max;
          return n;
        };
        const startRef = React.useRef({ x: 0, val: 0 });
        const onScrubStart = (e) => {
          e.preventDefault();
          startRef.current = { x: e.clientX, val: value };
          const decimals = (String(step).split('.')[1] || '').length;
          const move = (ev) => {
            const dx = ev.clientX - startRef.current.x;
            const raw = startRef.current.val + dx * step;
            const snapped = Math.round(raw / step) * step;
            onChange(clamp(Number(snapped.toFixed(decimals))));
          };
          const up = () => {
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', up);
          };
          window.addEventListener('pointermove', move);
          window.addEventListener('pointerup', up);
        };
        return (
          <div className="twk-num">
            <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
            <input type="number" value={value} min={min} max={max} step={step}
                   onChange={(e) => onChange(clamp(Number(e.target.value)))} />
            {unit && <span className="twk-num-unit">{unit}</span>}
          </div>
        );
      }
      
      function TweakColor({ label, value, onChange }) {
        return (
          <div className="twk-row twk-row-h">
            <div className="twk-lbl"><span>{label}</span></div>
            <input type="color" className="twk-swatch" value={value}
                   onChange={(e) => onChange(e.target.value)} />
          </div>
        );

      function HeroImages({ tweaks }) {

            ...HOME_BONUS_BUY_SLOTS,
            ...HOME_INSTANT_WIN,
            ...NEW_RELEASES,
          ];
          const seen = new Set();
          const pool = [];
          for (const slot of allSlots) {
            if (slot.img && !seen.has(slot.img)) {
              seen.add(slot.img);
              pool.push({ src: slot.img, pos: slot.pos || "center center" });
            }
          }
          for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
          }
          return pool.slice(0, 4);
        }, []);

        return (
          <section style={{
            overflow: "hidden",
            background: "#1a1e23",

              {IMAGES.map(({ src, pos }, i) => {
                const isFirst = i === 0;

                  ? `polygon(0 0, 100% 0, calc(100% - ${D}px) 100%, 0 100%)`
                  : isLast
                  ? `polygon(${D}px 0, 100% 0, 100% 100%, 0 100%)`

                return (
                  <div key={i} style={{
                    flex: 1, position: "relative", clipPath: clip,
                    marginLeft: isFirst ? 0 : -(D - 3),

                    <div style={{

                      backgroundSize: "cover",
                      backgroundPosition: pos,

                  </div>

      // ─── bankroll calc page ────────────────────────────────────────────────────

      function BankrollCalcPage() {
        const VOL_TRIGGER = { Medium: 100, High: 150, "Very High": 200, Extreme: 300 };
        const VOL_MULT    = { Medium: [1.5, 2.5], High: [2.0, 3.5], "Very High": [3.0, 5.0], Extreme: [4.0, 7.0] };
        const BET_OPTIONS = [0.10, 0.20, 0.50, 1.00, 2.00, 5.00, 10.00, 20.00];

        const slotList = [{ id: "custom", name: "— Custom values —", rtp: 96.00, vol: "Medium", buyMult: 100 },
          ...ALL_SLOTS.filter(s => s.vol !== "Variable").map(s => {
            const bbSlot = (typeof HOME_BONUS_BUY_SLOTS !== "undefined"
              ? HOME_BONUS_BUY_SLOTS : []).find(b => b.id === s.id);
            const buyMult = bbSlot ? parseInt(bbSlot.buyFrom) || 100 : 100;
            return { id: s.id, name: s.name, rtp: s.rtp, vol: s.vol, buyMult };
          })];

        const [tab, setTab] = React.useState("deposit");

        // ── Tab 1 state ──
        const [slotId1, setSlotId1] = React.useState("custom");
        const [rtp1,    setRtp1]    = React.useState(96.00);
        const [vol1,    setVol1]    = React.useState("Medium");
        const [bet1,    setBet1]    = React.useState(0.50);
        const [spins1,  setSpins1]  = React.useState(100);
        const handleSlot1 = (id) => {
          setSlotId1(id);
          const s = slotList.find(x => x.id === id);
          if (!s || id === "custom") return;
          setRtp1(s.rtp); setVol1(s.vol); setSpins1(VOL_TRIGGER[s.vol] || 100);
        };

        // ── Tab 2 state ──
        const [slotId2, setSlotId2] = React.useState("custom");
        const [vol2,    setVol2]    = React.useState("Medium");
        const [spins2,  setSpins2]  = React.useState(100);
        const [budget,  setBudget]  = React.useState(50);
        const handleSlot2 = (id) => {
          setSlotId2(id);
          const s = slotList.find(x => x.id === id);
          if (!s || id === "custom") return;
          setVol2(s.vol); setSpins2(VOL_TRIGGER[s.vol] || 100);
        };

        // ── Tab 3 state ──
        const [slotId3,  setSlotId3]  = React.useState("custom");
        const [rtp3,     setRtp3]     = React.useState(96.00);
        const [bet3,     setBet3]     = React.useState(1.00);
        const [spins3,   setSpins3]   = React.useState(100);
        const [buyMult3, setBuyMult3] = React.useState(100);
        const handleSlot3 = (id) => {
          setSlotId3(id);
          const s = slotList.find(x => x.id === id);
          if (!s || id === "custom") return;
          setRtp3(s.rtp); setSpins3(VOL_TRIGGER[s.vol] || 100); setBuyMult3(s.buyMult || 100);
        };

        // ── Shared helpers ──
        const fmt = (n) => "€" + (n >= 10 ? Math.round(n) : n.toFixed(2));
        const inputStyle = {
          width: "100%", background: "var(--bg-3)", border: "1px solid var(--line)",
          borderRadius: 10, color: "var(--fg-1)", fontSize: 15, fontWeight: 600,
          padding: "12px 14px", fontFamily: "inherit", outline: "none",
        };
        const labelStyle = {
          display: "block", fontSize: 10.5, fontWeight: 700, color: "var(--fg-3)",
          letterSpacing: 1.3, textTransform: "uppercase", marginBottom: 8,
        };
        const resultBox = (label, value, highlight, color) => {
          const c = color || "var(--accent)";
          return (
            <div style={{
              background: highlight ? `${c}14` : "var(--bg-3)",
              border: `1px solid ${highlight ? `${c}55` : "var(--line-soft)"}`,
              borderRadius: 14, padding: "20px 22px",
            }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: highlight ? c : "var(--fg-3)", letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
              <div style={{ fontSize: 28, fontWeight: 800, color: highlight ? c : "#fff", letterSpacing: -1, fontVariantNumeric: "tabular-nums" }}>{value}</div>
            </div>
          );
        };
        const SlotSelect = ({ value, onChange }) => (
          <select value={value} onChange={e => onChange(e.target.value)} style={{ ...inputStyle, appearance: "none" }}>
            {slotList.map(s => <option key={s.id} value={s.id}>{s.name}{s.id !== "custom" ? ` — RTP ${s.rtp}%` : ""}</option>)}
          </select>
        );
        const BetSelect = ({ value, onChange }) => (
          <select value={value} onChange={e => onChange(parseFloat(e.target.value))} style={{ ...inputStyle, appearance: "none" }}>
            {BET_OPTIONS.map(v => <option key={v} value={v}>€{v.toFixed(2)}</option>)}
          </select>
        );
        const disclaimer = (
          <div style={{ background: "var(--bg-3)", border: "1px solid var(--line-soft)", borderRadius: 12, padding: "14px 18px", fontSize: 12, color: "var(--fg-4)", lineHeight: 1.6 }}>
            ⚠️ Statistical estimates only — not guarantees. Slot outcomes are random. Gamble responsibly. 18+.
          </div>
        );
        const inputCard = (children) => (
          <div style={{ background: "var(--bg-2)", border: "1px solid var(--line-soft)", borderRadius: 16, padding: "28px" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "var(--fg-3)", letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 20 }}>Inputs</div>
            {children}
          </div>
        );
        const resultCard = (children) => (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ background: "var(--bg-2)", border: "1px solid var(--line-soft)", borderRadius: 16, padding: "28px" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "var(--fg-3)", letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 20 }}>Results</div>
              {children}
            </div>
            {disclaimer}
          </div>
        );

        // ── Tab 1 calc ──
        const mult1      = VOL_MULT[vol1] || VOL_MULT.Medium;
        const staked1    = bet1 * spins1;
        const expLoss1   = staked1 * (1 - rtp1 / 100);
        const minDep1    = Math.ceil(Math.max(expLoss1 * mult1[0], bet1 * 20));
        const recDep1    = Math.ceil(Math.max(expLoss1 * mult1[1], bet1 * 40));

        // ── Tab 2 calc ──
        const mult2      = VOL_MULT[vol2] || VOL_MULT.Medium;
        const safeDivisor = mult2[1] * spins2;
        const rawBet     = budget / safeDivisor;
        const recBet2    = BET_OPTIONS.slice().reverse().find(b => b <= rawBet) || BET_OPTIONS[0];
        const expSpins2  = Math.floor(budget / recBet2);
        const expBonus2  = Math.floor(expSpins2 / spins2);

        // ── Tab 3 calc ──
        const organicCost = bet3 * (1 - rtp3 / 100) * spins3;
        const buyCost     = bet3 * buyMult3;
        const buyWins     = buyCost < organicCost;
        const savings3    = Math.abs(organicCost - buyCost);

        const TABS = [
          { id: "deposit", label: "Deposit Calc" },
          { id: "reverse", label: "Reverse Calc" },
          { id: "buyvsorgan", label: "Buy vs Organic" },
        ];

        return (
          <div>
            {/* Hero */}
            <section style={{ padding: "52px 0 48px", borderBottom: "1px solid var(--line-soft)" }}>
              <div className="wrap">
                <div style={{ fontSize: 11, color: "var(--accent)", fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 10 }}>Slot Calculator Suite</div>
                <h1 style={{ fontSize: "clamp(28px,5vw,48px)", fontWeight: 800, color: "#fff", letterSpacing: -1.5, margin: "0 0 12px", lineHeight: 1.05 }}>Three tools. Smarter sessions.</h1>
                <p style={{ fontSize: 16, color: "var(--fg-2)", maxWidth: 580, lineHeight: 1.7, margin: 0 }}>Calculate your deposit, find the right bet size for your budget, or compare Bonus Buy against grinding — all in one place.</p>
              </div>
            </section>

            {/* Calculator */}
            <section style={{ padding: "40px 0 60px" }}>
              <div className="wrap">

                {/* Tab bar */}
                <div style={{ display: "flex", gap: 4, background: "var(--bg-2)", border: "1px solid var(--line-soft)", borderRadius: 12, padding: 4, width: "fit-content", marginBottom: 32 }}>
                  {TABS.map(t => (
                    <button key={t.id} onClick={() => setTab(t.id)} style={{
                      padding: "9px 20px", borderRadius: 9, fontSize: 13.5, fontWeight: 600,
                      cursor: "pointer", border: "none", fontFamily: "inherit", transition: "all .18s",
                      background: tab === t.id ? "var(--blue)" : "transparent",
                      color: tab === t.id ? "#fff" : "var(--fg-3)",
                    }}>{t.label}</button>
                  ))}
                </div>

                {/* ── Tab 1: Deposit Calc ── */}
                {tab === "deposit" && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 28, alignItems: "start" }}>
                    {inputCard(<>
                      <div style={{ marginBottom: 18 }}>
                        <label style={labelStyle}>Slot</label>
                        <SlotSelect value={slotId1} onChange={handleSlot1}/>
                      </div>
                      <div style={{ marginBottom: 18 }}>
                        <label style={labelStyle}>Bet per spin</label>
                        <BetSelect value={bet1} onChange={setBet1}/>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 18 }}>
                        <div>
                          <label style={labelStyle}>RTP (%)</label>
                          <input type="number" min="80" max="99" step="0.01" value={rtp1} onChange={e => setRtp1(parseFloat(e.target.value) || 96)} style={inputStyle}/>
                        </div>
                        <div>
                          <label style={labelStyle}>Volatility</label>
                          <select value={vol1} onChange={e => { setVol1(e.target.value); setSpins1(VOL_TRIGGER[e.target.value] || 100); }} style={{ ...inputStyle, appearance: "none" }}>
                            {["Medium","High","Very High","Extreme"].map(v => <option key={v} value={v}>{v}</option>)}
                          </select>
                        </div>
                      </div>
                      <div>
                        <label style={labelStyle}>Avg spins to bonus</label>
                        <input type="number" min="10" max="1000" step="10" value={spins1} onChange={e => setSpins1(parseInt(e.target.value) || 100)} style={inputStyle}/>
                        <div style={{ fontSize: 11.5, color: "var(--fg-4)", marginTop: 6 }}>Defaults: Medium ~100 · High ~150 · Very High ~200 · Extreme ~300</div>
                      </div>
                    </>)}
                    {resultCard(<>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                        {resultBox("Avg spins to bonus", spins1)}
                        {resultBox("Total staked", fmt(staked1))}
                        {resultBox("Expected net loss", "~" + fmt(expLoss1))}
                        {resultBox("Minimum deposit", fmt(minDep1))}
                      </div>
                      {resultBox("Recommended deposit", fmt(recDep1), true)}
                      <div style={{ background: "var(--bg-3)", border: "1px solid rgba(200,162,58,0.2)", borderRadius: 12, padding: "14px 18px", fontSize: 13, color: "var(--fg-2)", lineHeight: 1.7, marginTop: 12 }}>
                        At <strong style={{ color: "#fff" }}>€{bet1.toFixed(2)}/spin</strong>, {spins1} avg spins to bonus, expected net loss <strong style={{ color: "var(--accent)" }}>~{fmt(expLoss1)}</strong>. Keep <strong style={{ color: "var(--accent)" }}>{fmt(recDep1)}</strong> available to survive variance.
                      </div>
                    </>)}
                  </div>
                )}

                {/* ── Tab 2: Reverse Calc ── */}
                {tab === "reverse" && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 28, alignItems: "start" }}>
                    {inputCard(<>
                      <div style={{ marginBottom: 18 }}>
                        <label style={labelStyle}>My budget</label>
                        <input type="number" min="5" max="10000" step="5" value={budget} onChange={e => setBudget(parseFloat(e.target.value) || 50)} style={inputStyle}/>
                        <div style={{ fontSize: 11.5, color: "var(--fg-4)", marginTop: 6 }}>Enter your total available deposit in €</div>
                      </div>
                      <div style={{ marginBottom: 18 }}>
                        <label style={labelStyle}>Slot</label>
                        <SlotSelect value={slotId2} onChange={handleSlot2}/>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                        <div>
                          <label style={labelStyle}>Volatility</label>
                          <select value={vol2} onChange={e => { setVol2(e.target.value); setSpins2(VOL_TRIGGER[e.target.value] || 100); }} style={{ ...inputStyle, appearance: "none" }}>
                            {["Medium","High","Very High","Extreme"].map(v => <option key={v} value={v}>{v}</option>)}
                          </select>
                        </div>
                        <div>
                          <label style={labelStyle}>Avg spins to bonus</label>
                          <input type="number" min="10" max="1000" step="10" value={spins2} onChange={e => setSpins2(parseInt(e.target.value) || 100)} style={inputStyle}/>
                        </div>
                      </div>
                    </>)}
                    {resultCard(<>
                      <div style={{ marginBottom: 12 }}>
                        {resultBox("Recommended bet", "€" + recBet2.toFixed(2), true)}
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                        {resultBox("Expected spins", expSpins2)}
                        {resultBox("Expected bonuses", expBonus2 > 0 ? expBonus2 : "<1")}
                      </div>
                      <div style={{ background: "var(--bg-3)", border: "1px solid rgba(200,162,58,0.2)", borderRadius: 12, padding: "14px 18px", fontSize: 13, color: "var(--fg-2)", lineHeight: 1.7 }}>
                        With <strong style={{ color: "#fff" }}>€{budget}</strong> on a {vol2.toLowerCase()} volatility slot, bet <strong style={{ color: "var(--accent)" }}>€{recBet2.toFixed(2)}/spin</strong>. That gives ~{expSpins2} spins and statistically {expBonus2 > 0 ? expBonus2 + " bonus round" + (expBonus2 > 1 ? "s" : "") : "less than 1 bonus round"}.
                      </div>
                    </>)}
                  </div>
                )}

                {/* ── Tab 3: Bonus Buy vs Organic ── */}
                {tab === "buyvsorgan" && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 28, alignItems: "start" }}>
                    {inputCard(<>
                      <div style={{ marginBottom: 18 }}>
                        <label style={labelStyle}>Slot</label>
                        <SlotSelect value={slotId3} onChange={handleSlot3}/>
                      </div>
                      <div style={{ marginBottom: 18 }}>
                        <label style={labelStyle}>Bet per spin</label>
                        <BetSelect value={bet3} onChange={setBet3}/>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 18 }}>
                        <div>
                          <label style={labelStyle}>RTP (%)</label>
                          <input type="number" min="80" max="99" step="0.01" value={rtp3} onChange={e => setRtp3(parseFloat(e.target.value) || 96)} style={inputStyle}/>
                        </div>
                        <div>
                          <label style={labelStyle}>Avg spins to bonus</label>
                          <input type="number" min="10" max="1000" step="10" value={spins3} onChange={e => setSpins3(parseInt(e.target.value) || 100)} style={inputStyle}/>
                        </div>
                      </div>
                      <div>
                        <label style={labelStyle}>Bonus Buy cost (× bet)</label>
                        <input type="number" min="1" max="10000" step="1" value={buyMult3} onChange={e => setBuyMult3(parseInt(e.target.value) || 100)} style={inputStyle}/>
                        <div style={{ fontSize: 11.5, color: "var(--fg-4)", marginTop: 6 }}>e.g. 100 means Bonus Buy costs 100× your bet</div>
                      </div>
                    </>)}
                    {resultCard(<>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                        {resultBox("Organic expected cost", "~" + fmt(organicCost))}
                        {resultBox("Bonus Buy cost", fmt(buyCost))}
                      </div>
                      {resultBox(
                        buyWins ? "Verdict — Buy it" : "Verdict — Grind it",
                        buyWins ? "Buy saves " + fmt(savings3) : "Organic saves " + fmt(savings3),
                        true,
                        buyWins ? "#27AE60" : "#C8A23A"
                      )}
                      <div style={{ background: "var(--bg-3)", border: `1px solid ${buyWins ? "rgba(39,174,96,0.2)" : "rgba(200,162,58,0.2)"}`, borderRadius: 12, padding: "14px 18px", fontSize: 13, color: "var(--fg-2)", lineHeight: 1.7, marginTop: 12 }}>
                        {buyWins
                          ? <>Bonus Buy at <strong style={{ color: "#fff" }}>{buyMult3}× bet</strong> costs <strong style={{ color: "#fff" }}>{fmt(buyCost)}</strong>. Grinding costs ~<strong style={{ color: "#fff" }}>{fmt(organicCost)}</strong> in expected losses. <strong style={{ color: "#27AE60" }}>Buy saves you {fmt(savings3)} on average.</strong></>
                          : <>Grinding costs ~<strong style={{ color: "#fff" }}>{fmt(organicCost)}</strong> in expected losses. Bonus Buy at <strong style={{ color: "#fff" }}>{buyMult3}× bet</strong> costs <strong style={{ color: "#fff" }}>{fmt(buyCost)}</strong>. <strong style={{ color: "var(--accent)" }}>Save {fmt(savings3)} by grinding.</strong></>
                        }
                      </div>
                      <div style={{ fontSize: 11.5, color: "var(--fg-4)", marginTop: 8, lineHeight: 1.5 }}>Note: Bonus Buy RTP may differ from base game. Always check the game info panel. Bonus Buy unavailable in UK, Germany &amp; other restricted markets.</div>
                    </>)}
                  </div>
                )}

              </div>
            </section>
            <SiteFooter/>
          </div>
        );
      }

      function App() {

            <TopNav route={route} setRoute={setRoute}/>
            <ComplianceStrip/>
            {route === "home"                    && <HomePage tweaks={tweaks} setRoute={setRoute}/>}
            {route === "bonuses"                 && <BonusesPage tweaks={tweaks}/>}
            {route === "bonus-buy"               && <BonusBuyPage/>}
            {route === "free-spins"              && <FreeSpinsPage/>}
            {route === "rtp-database"            && <RtpDatabasePage/>}
            {route === "max-wins"                && <MaxWinsPage/>}
            {route === "crash-games"             && <CrashGamesPage/>}
            {route === "bankroll-calc"           && <BankrollCalcPage/>}
            {route.startsWith("slot/")           && <SlotPage slotId={route.replace("slot/","")} setRoute={setRoute}/>}
      
            <TweaksPanel title="Tweaks">
              <TweakSection label="Hero"/>
              <TweakRadio
                label="Variant"
                value={tweaks.heroVariant}
                options={[
                  { value: "ranking",   label: "Ranking" },
                  { value: "editorial", label: "Editorial" },
                  { value: "slot",      label: "Slot focus" },
                  { value: "images",    label: "4 Images" },
                ]}
                onChange={v => setTweak("heroVariant", v)}
              />
              <TweakText
                label="Subhead"
                value={tweaks.heroSubhead}
                onChange={v => setTweak("heroSubhead", v)}
              />
              <TweakSection label="Card density"/>
              <TweakRadio
                label="Layout"
                value={tweaks.cardDensity}
                options={[
                  { value: "comfortable", label: "Comfortable" },
                  { value: "compact",     label: "Compact" },
                ]}
                onChange={v => setTweak("cardDensity", v)}
              />
            </TweaksPanel>
          </>
        );
      }
      
      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
  </body>
</html>
